<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar Profile Photo Test</title>
    <style>
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            overflow: hidden;
        }
        .user-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Navigation Bar Profile Photo Test</h1>
    <p>Testing navigation bar profile photo display:</p>
    
    <div class="user-avatar" id="testAvatar">
        A
    </div>
    
    <br><br>
    <button onclick="testProfilePhoto()">Test Profile Photo Loading</button>
    <br><br>
    <div id="result"></div>
    
    <script>
        function getImageUrl(photoUrl, fallbackUrl = 'images/default-avatar.png') {
            if (!photoUrl || photoUrl === 'undefined' || photoUrl === 'null') return fallbackUrl;
            if (photoUrl.startsWith('http')) return photoUrl;
            
            // Ensure path starts with a slash
            const path = photoUrl.startsWith('/') ? photoUrl : `/${photoUrl}`;
            return `http://localhost:3001${path}`;
        }
        
        function testProfilePhoto() {
            const testAvatar = document.getElementById('testAvatar');
            const profilePhoto = '/uploads/profile-1777297520634-634090700.jpg';
            
            console.log('Testing profile photo:', profilePhoto);
            
            if (profilePhoto && profilePhoto.trim() !== '') {
                const imageUrl = getImageUrl(profilePhoto);
                console.log('Generated image URL:', imageUrl);
                testAvatar.innerHTML = `<img src="${imageUrl}" alt="Test User" class="user-avatar-img" onerror="console.error('Image failed to load:', this.src); this.parentElement.innerHTML='A';">`;
                document.getElementById('result').innerHTML = '<p style="color: green;">✅ Profile photo URL generated and applied!</p>';
            } else {
                document.getElementById('result').innerHTML = '<p style="color: red;">❌ No profile photo found</p>';
            }
        }
        
        // Auto-test on load
        window.onload = function() {
            setTimeout(testProfilePhoto, 1000);
        };
    </script>
</body>
</html>
