version: '3.8'

services:
  umukozi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umukozi-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=umukozi_jwt_secret_key_2024
      - JWT_EXPIRE=24h
    volumes:
      - ./uploads:/app/uploads
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - umukozi-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: umukozi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - umukozi-app
    restart: unless-stopped
    networks:
      - umukozi-network
    profiles:
      - production

networks:
  umukozi-network:
    driver: bridge

volumes:
  uploads:
    driver: local
  database:
    driver: local
